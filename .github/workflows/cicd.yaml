name: Secure Terraform CI/CD with OPA

on:
  push:
    branches:
      - main

  pull_request:

env:
  TF_VERSION: 1.6.6
  AWS_REGION: ap-south-1

jobs:
  # ----------------------------------
  # PLAN + SECURITY + OPA POLICY CHECK
  # ----------------------------------
  plan:
    name: Plan + Security + Policy Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [dev, tst, prod]

    defaults:
      run:
        working-directory: envs/${{ matrix.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Secret scanning
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main

      # 🔐 Terraform security scanning
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 🔐 AWS OIDC Authentication
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/terraform-${{ matrix.env }}-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Save Plan)
        run: terraform plan -out=tfplan -var-file="terraform.tfvars"

      # 🔁 Convert plan to JSON for OPA
      - name: Convert Plan to JSON
        run: terraform show -json tfplan > tfplan.json

      # 🔐 Install OPA (Conftest)
      - name: Install Conftest
        run: |
          wget https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz
          tar xzf conftest_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      # 🔐 Run OPA Policies
      - name: Run OPA Policy Checks
        run: conftest test tfplan.json --policy ../../policies/

      - name: Show Plan Output
        run: terraform show tfplan

      # 📦 Upload plan artifact
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: envs/${{ matrix.env }}/tfplan
          retention-days: 5

  # -----------------------
  # APPLY DEV (APPROVAL)
  # -----------------------
  apply-dev:
    name: Apply DEV
    needs: plan
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/terraform-dev-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: envs/dev

      - name: Terraform Init
        run: terraform init

      - name: Apply Saved Plan
        run: terraform apply -auto-approve tfplan

  # -----------------------
  # APPLY TST (APPROVAL)
  # -----------------------
  apply-tst:
    name: Apply TST
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: tst

    defaults:
      run:
        working-directory: envs/tst

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/terraform-tst-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-tst
          path: envs/tst

      - name: Terraform Init
        run: terraform init

      - name: Apply Saved Plan
        run: terraform apply -auto-approve tfplan

  # -----------------------
  # APPLY PROD (APPROVAL)
  # -----------------------
  apply-prod:
    name: Apply PROD
    needs: apply-tst
    runs-on: ubuntu-latest
    environment: prod

    defaults:
      run:
        working-directory: envs/prod

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/terraform-prod-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: envs/prod

      - name: Terraform Init
        run: terraform init

      - name: Apply Saved Plan
        run: terraform apply -auto-approve tfplan